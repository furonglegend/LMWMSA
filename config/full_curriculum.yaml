# Full curriculum training pipeline configuration
# Trains a large full-attention teacher on joint image+video data,
# adapts teacher to sparse-causal, then distills into single-step LWT.

exp_name: "ctrlvsr_full_curriculum"
parent: "default.yaml"

stage: "full_curriculum"

teacher:
  type: "dense_transformer"
  latent_dim: 512
  depth: 12
  heads: 16

adaptation:
  convert_to_sparse: true
  block_size: 16
  causal_masking: true

distillation:
  temperature: 1.0
  distill_steps: 100000
  teacher_ckpt_path: null

training:
  batch_size: 8
  num_epochs: 300
  lr: 5e-5
  lr_scheduler:
    type: "cosine"
    warmup_steps: 2000

loss_weights:
  lambda_DMD: 2.0
  lambda_flow: 1.0
  lambda_l2: 1.0
  lambda_LPIPS: 0.7
  lambda_JEPA: 0.2
  lambda_dec: 2.0

# Resources & distributed settings
distributed:
  use_ddp: true
  gpus_per_node: 8
